services:
  - type: web
    name: eduplatform-backend
    runtime: node
    rootDir: server
    buildCommand: npm install && node seed.js
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
